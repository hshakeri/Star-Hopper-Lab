name: deploy-pages

# GitHub Pages serves the gh-pages branch (legacy branch deploy — enabled
# automatically when the branch was first pushed). This workflow keeps that
# branch in lockstep with main: tests must pass, then main is mirrored.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-mirror
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run regression suite before deploying
        run: node tests/run-tests.js
      - name: Mirror main to gh-pages
        run: git push origin HEAD:gh-pages --force
